<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MapLibre GitHub Demo</title>

  <!-- MapLibre CSS -->
  <link
    href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- MapLibre JS -->
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<script>
  new maplibregl.Map({
    container: 'map',
    style: './style.json',
    center: [-1.58, 54.14], // UK example
    zoom: 6
  });
</script>

</body>
</html>
